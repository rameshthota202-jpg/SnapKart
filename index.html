<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapKart</title>

  <style>

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f5f5f5;
    }

    /* PREMIUM HERO SECTION */

    .hero{
      height:100vh;
      background:linear-gradient(to right,#111,#ff4d4d);
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:white;
      padding:20px;
    }

    .hero-content{
      animation:fadeUp 1.5s ease;
    }

    .hero-content h1{
      font-size:60px;
      margin-bottom:15px;
    }

    .hero-content p{
      font-size:22px;
      margin-bottom:30px;
    }

    .hero-buttons{
      display:flex;
      gap:15px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .btn{
      background:white;
      color:black;
      padding:14px 30px;
      border-radius:40px;
      text-decoration:none;
      font-weight:bold;
      transition:0.3s;
      animation:zoomIn 1.2s ease;
    }

    .btn:hover{
      transform:scale(1.08);
      box-shadow:0 0 20px rgba(255,255,255,0.8);
    }

    .btn-secondary{
      background:#25D366;
      color:white;
    }

    /* ANIMATIONS */

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(50px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    @keyframes zoomIn{

      from{
        opacity:0;
        transform:scale(0.5);
      }

      to{
        opacity:1;
        transform:scale(1);
      }

    }

    /* MOBILE */

    @media(max-width:768px){

      .hero-content h1{
        font-size:38px;
      }

      .hero-content p{
        font-size:18px;
      }

    }

  </style>

</head>

<body>

  <section class="hero">

    <div class="hero-content">

      <h1>Welcome to SnapKart 🚀</h1>

      <p>Best Trending Products at Amazing Prices</p>

      <div class="hero-buttons">

        <a href="#products" class="btn">
          Shop Now
        </a>

        <a href="https://wa.me/919999999999" class="btn btn-secondary">
          WhatsApp Order
        </a>

      </div>

    </div>

  </section>

</body>
</html>
