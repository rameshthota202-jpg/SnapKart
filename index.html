<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapKart</title>

  <style>

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f5f5f5;
    }

    /* HERO SECTION */

    .hero{
      height:100vh;

      background:
      linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
      url('images/snapkart banner.png');

      background-size:cover;
      background-position:center;

      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:white;
      padding:20px;
    }

    .hero-content{
      animation:fadeUp 1.5s ease;
    }

    .hero-content h1{
      font-size:60px;
      margin-bottom:15px;
    }

    .hero-content p{
      font-size:22px;
      margin-bottom:30px;
    }

    .hero-buttons{
      display:flex;
      gap:15px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .btn{
      background:white;
      color:black;
      padding:14px 30px;
      border-radius:40px;
      text-decoration:none;
      font-weight:bold;
      transition:0.3s;
      animation:zoomIn 1.2s ease;
    }

    .btn:hover{
      transform:scale(1.08);
      box-shadow:0 0 20px rgba(255,255,255,0.8);
    }

    .btn-secondary{
      background:#25D366;
      color:white;
    }

    /* ANIMATIONS */

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(50px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    @keyframes zoomIn{

      from{
        opacity:0;
        transform:scale(0.5);
      }

      to{
        opacity:1;
        transform:scale(1);
      }

    }

    /* PRODUCTS SECTION */

    .products{
      padding:60px 20px;
      text-align:center;
    }

    .products h2{
      font-size:40px;
      margin-bottom:40px;
    }

    .product-container{
      display:flex;
      justify-content:center;
      gap:30px;
      flex-wrap:wrap;
    }

    .product-card{
      background:white;
      width:280px;
      padding:20px;
      border-radius:20px;
      box-shadow:0 0 20px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .product-card:hover{
      transform:translateY(-10px);
    }

    .product-card img{
      width:100%;
      border-radius:15px;
    }

    .product-card h3{
      margin-top:15px;
      font-size:24px;
    }

    .product-card p{
      font-size:20px;
      color:#ff4081;
    }

    .buy-btn{
      display:inline-block;
      margin-top:15px;
      background:#111;
      color:white;
      padding:12px 25px;
      border-radius:30px;
      text-decoration:none;
    }

    /* MOBILE */

    @media(max-width:768px){

      .hero-content h1{
        font-size:38px;
      }

      .hero-content p{
        font-size:18px;
      }

      .products h2{
        font-size:32px;
      }

    }

  </style>

</head>

<body>

  <!-- HERO SECTION -->

  <section class="hero">

    <div class="hero-content">

      <h1>Welcome to SnapKart 🚀</h1>

      <p>Best Trending Products at Amazing Prices</p>

      <div class="hero-buttons">

        <a href="https://wa.me/919848830202" class="btn">
          Shop Now
        </a>

        <a href="https://wa.me/919848830202" class="btn btn-secondary">
          WhatsApp Order
        </a>

      </div>

    </div>

  </section>

  <!-- PRODUCTS SECTION -->

  <section class="products">

    <h2>Our Products 🛍️</h2>

    <div class="product-container">

      <div class="product-card">
        <img src="https://via.placeholder.com/250" alt="Product">

        <h3>Custom Mug</h3>

        <p>₹299</p>

        <a href="https://wa.me/919848830202" class="buy-btn">
          Order Now
        </a>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/250" alt="Product">

        <h3>Photo Frame</h3>

        <p>₹499</p>

        <a href="https://wa.me/919848830202" class="buy-btn">
          Order Now
        </a>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/250" alt="Product">

        <h3>T-Shirt Print</h3>

        <p>₹699</p>

        <a href="https://wa.me/919848830202" class="buy-btn">
          Order Now
        </a>
      </div>

    </div>

  </section>

</body>
</html>
