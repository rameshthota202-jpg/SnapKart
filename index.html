<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SnapKart</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

/* HERO SECTION */

.hero{

height:100vh;

background:
linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
url('images/snapkart banner.png');

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;

}

.hero-content h1{
font-size:65px;
margin-bottom:20px;
}

.hero-content p{
font-size:24px;
margin-bottom:30px;
}

.hero-buttons{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
padding:14px 30px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.btn-primary{
background:white;
color:black;
}

.btn-secondary{
background:#25D366;
color:white;
}

.btn:hover{
transform:scale(1.08);
}

/* PRODUCTS */

.products{
padding:80px 20px;
text-align:center;
}

.products h2{
font-size:48px;
margin-bottom:50px;
}

.product-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:35px;
}

.product-card{
width:360px;
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
transition:0.3s;
}

.product-card:hover{
transform:translateY(-10px);
}

/* SLIDESHOW */

.slideshow-container{
width:100%;
height:260px;
position:relative;
overflow:hidden;
border-radius:15px;
}

.slide{
width:100%;
height:260px;
object-fit:cover;
position:absolute;
left:0;
top:0;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

.product-card h3{
font-size:30px;
margin-top:20px;
}

.price{
color:#ff4081;
font-size:28px;
font-weight:bold;
margin-top:10px;
}

/* OPTIONS */

.options{
display:flex;
justify-content:center;
gap:15px;
margin:25px 0;
flex-wrap:wrap;
}

.option-btn{
border:none;
padding:12px 25px;
border-radius:30px;
background:#eee;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.option-btn:hover{
background:#111;
color:white;
}

/* BUY BUTTON */

.buy-btn{
display:inline-block;
padding:14px 35px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:40px;
font-weight:bold;
transition:0.3s;
border:none;
cursor:pointer;
}

.buy-btn:hover{
transform:scale(1.05);
}

/* CART BUTTON */

#cartBtn{
position:fixed;
top:20px;
right:20px;
background:#111;
color:white;
border:none;
padding:14px 20px;
border-radius:40px;
font-size:16px;
cursor:pointer;
z-index:999;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* CART SIDEBAR */

#cartSidebar{
position:fixed;
top:0;
right:-400px;
width:350px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
transition:0.4s;
padding:20px;
z-index:1000;
overflow:auto;
}

.cart-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.cart-item{
padding:15px 0;
border-bottom:1px solid #ddd;
}

.remove-btn{
margin-top:10px;
padding:8px 14px;
border:none;
background:red;
color:white;
border-radius:10px;
cursor:pointer;
}

.orderBtn{
width:100%;
background:#25D366;
color:white;
border:none;
padding:15px;
border-radius:12px;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

@media(max-width:768px){

.hero-content h1{
font-size:42px;
}

.hero-content p{
font-size:18px;
}

.products h2{
font-size:36px;
}

.product-card{
width:100%;
}

#cartSidebar{
width:100%;
}

}

</style>

</head>

<body>

<!-- CART BUTTON -->

<button id="cartBtn" onclick="openCart()">
🛒 Cart (<span id="cartCount">0</span>)
</button>

<!-- CART SIDEBAR -->

<div id="cartSidebar">

<div class="cart-header">

<h2>Your Cart</h2>

<button onclick="closeCart()">✖</button>

</div>

<div id="cartItems"></div>

<h3>Total: ₹<span id="cartTotal">0</span></h3>

<a id="whatsappOrder" target="_blank">

<button class="orderBtn">
Order on WhatsApp 📲
</button>

</a>

</div>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<h1>Welcome to SnapKart 🚀</h1>

<p>Best Trending Products at Amazing Prices</p>

<div class="hero-buttons">

<a href="#products" class="btn btn-primary">
Shop Now
</a>

<a href="https://wa.me/919848830202" class="btn btn-secondary">
WhatsApp Order
</a>

</div>

</div>

</section>

<!-- PRODUCTS -->

<section class="products" id="products">

<h2>School Book Labels 📚</h2>

<div class="product-container">

<div class="product-card">

<div class="slideshow-container">

<img class="slide active" src="images/book-labels/Spiderman.webp">
<img class="slide" src="images/book-labels/Barbie.webp">
<img class="slide" src="images/book-labels/Doraemon.webp">
<img class="slide" src="images/book-labels/Ironman.webp">
<img class="slide" src="images/book-labels/Shinchan.webp">
<img class="slide" src="images/book-labels/Rocket.webp">
<img class="slide" src="images/book-labels/SchoolBus.webp">
<img class="slide" src="images/book-labels/Astronaut.webp">

</div>

<h3>Customized School Labels</h3>

<p class="price">₹99</p>

<div class="options">

<button class="option-btn">
Normal
</button>

<button class="option-btn">
Waterproof
</button>

</div>

<button class="buy-btn"
onclick="addToCart('Customized School Labels',99)">
Add To Cart 🛒
</button>

</div>

</div>

</section>

<script>

/* SLIDESHOW */

const slides = document.querySelectorAll(".slide");

let currentSlide = 0;

setInterval(() => {

slides[currentSlide].classList.remove("active");

currentSlide++;

if(currentSlide >= slides.length){
currentSlide = 0;
}

slides[currentSlide].classList.add("active");

}, 2500);

/* CART */

let cart = [];

function addToCart(product, price){

cart.push({
product,
price
});

updateCart();

}

function updateCart(){

let cartItems = document.getElementById("cartItems");
let cartCount = document.getElementById("cartCount");
let cartTotal = document.getElementById("cartTotal");

cartItems.innerHTML = "";

let total = 0;

cart.forEach((item,index)=>{

total += item.price;

cartItems.innerHTML += `

<div class="cart-item">

<h4>${item.product}</h4>

<p>₹${item.price}</p>

<button class="remove-btn"
onclick="removeItem(${index})">
Remove
</button>

</div>

`;

});

cartCount.innerText = cart.length;
cartTotal.innerText = total;

/* WHATSAPP MESSAGE */

let message = "Hello SnapKart 👋%0A%0A";

cart.forEach((item)=>{

message += `🛒 ${item.product} - ₹${item.price}%0A`;

});

message += `%0ATotal: ₹${total}`;

document.getElementById("whatsappOrder").href =
`https://wa.me/919848830202?text=${message}`;

}

function removeItem(index){

cart.splice(index,1);

updateCart();

}

function openCart(){

document.getElementById("cartSidebar").style.right = "0";

}

function closeCart(){

document.getElementById("cartSidebar").style.right = "-400px";

}

</script>

</body>

</html>
