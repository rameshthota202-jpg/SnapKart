<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SnapKart</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header>

<div class="logo">
Snap<span>Kart 🚀</span>
</div>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Business</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<img src="snapkart banner.png">

</section>

<section class="categories">

<h2>Shop By Categories</h2>

<div class="category-scroll">

<div class="cat-card">
<img src="images/book-labels/Barbie.webp">
<p>Book Labels</p>
</div>

<div class="cat-card">
<img src="images/ACRYLIC PHOTO FRAMES/acrylic_love_shape-frame.webp.webp">
<p>Acrylic Frames</p>
</div>

<div class="cat-card">
<img src="images/Lord Balaji Acrylic Photo Frame/bodle_1-frame.webp.webp">
<p>God Frames</p>
</div>

<div class="cat-card">
<img src="images/ID CARDS/Blue Metal ID Card Holder Aluminium Card Holder ID Card Badge.png">
<p>ID Cards</p>
</div>

</div>

</section>

<section class="products">

<h2>Trending Products</h2>

<div class="product-grid">

<div class="product-card">

<img src="images/book-labels/Barbie.webp">

<div class="product-info">

<h3>Book Labels</h3>

<div class="price">₹99</div>

<button class="buy-btn"
onclick="window.location.href='product.html'">

Customize Now

</button>

</div>

</div>

<div class="product-card">

<img src="images/ACRYLIC PHOTO FRAMES/acrylic_love_shape-frame.webp.webp">

<div class="product-info">

<h3>Acrylic Photo Frame</h3>

<div class="price">₹499</div>

<button class="buy-btn"
onclick="window.location.href='product.html'">

Order Now

</button>

</div>

</div>

<div class="product-card">

<img src="images/Lord Balaji Acrylic Photo Frame/bodle_1-frame.webp.webp">

<div class="product-info">

<h3>God Acrylic Frame</h3>

<div class="price">₹799</div>

<button class="buy-btn"
onclick="window.location.href='product.html'">

Order Now

</button>

</div>

</div>

</div>

</section>

</body>
</html>
