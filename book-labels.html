<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School Book Labels</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f5f5;
}

/* HEADER */

.header{
  background:#111;
  color:white;
  padding:20px;
  text-align:center;
}

/* PRODUCT PAGE */

.product-page{
  display:flex;
  flex-wrap:wrap;
  gap:40px;
  padding:40px;
  justify-content:center;
  align-items:flex-start;
}

/* SLIDER */

.slider{
  width:450px;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.1);
}

.slider img{
  width:100%;
  border-radius:15px;
}

.thumbnails{
  display:flex;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
  justify-content:center;
}

.thumbnails img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
  border:2px solid transparent;
}

.thumbnails img:hover{
  border:2px solid #ff4081;
}

/* DETAILS */

.details{
  max-width:450px;
}

.details h1{
  font-size:38px;
}

.price{
  font-size:32px;
  color:#ff4081;
  margin:20px 0;
}

.option-title{
  margin-top:20px;
  font-weight:bold;
}

.option-buttons{
  display:flex;
  gap:15px;
  margin-top:10px;
  flex-wrap:wrap;
}

.option-buttons button{
  padding:12px 20px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  background:#111;
  color:white;
}

.whatsapp-btn{
  display:inline-block;
  margin-top:30px;
  background:#25D366;
  color:white;
  padding:15px 30px;
  border-radius:40px;
  text-decoration:none;
  font-size:18px;
}

/* MOBILE */

@media(max-width:768px){

  .product-page{
    padding:20px;
  }

  .slider{
    width:100%;
  }

  .details h1{
    font-size:28px;
  }

}

</style>

</head>

<body>

<div class="header">
  <h2>SnapKart 📚</h2>
</div>

<section class="product-page">

  <!-- IMAGE SLIDER -->

  <div class="slider">

    <img id="mainImage" src="images/book-labels/Spiderman.webp">

    <div class="thumbnails">

      <img src="images/book-labels/Spiderman.webp" onclick="changeImage(this)">
      <img src="images/book-labels/Barbie.webp" onclick="changeImage(this)">
      <img src="images/book-labels/Ben10.webp" onclick="changeImage(this)">
      <img src="images/book-labels/Doraemon.webp" onclick="changeImage(this)">
      <img src="images/book-labels/Ironman.webp" onclick="changeImage(this)">
      <img src="images/book-labels/Unicorn.webp" onclick="changeImage(this)">

    </div>

  </div>

  <!-- PRODUCT DETAILS -->

  <div class="details">

    <h1>
      School Books Label with Customized Photo
    </h1>

    <div class="price">
      ₹99
    </div>

    <p>
      Premium quality custom school labels with your child photo & name.
    </p>

    <!-- PAPER QUALITY -->

    <div class="option-title">
      Paper Quality
    </div>

    <div class="option-buttons">

      <button>Normal</button>

      <button>Waterproof</button>

    </div>

    <!-- WHATSAPP -->

    <a
      href="https://wa.me/919848830202"
      class="whatsapp-btn">

      Order on WhatsApp

    </a>

  </div>

</section>

<script>

function changeImage(element){

  document.getElementById("mainImage").src =
  element.src;

}

/* AUTO SLIDE */

const images = [

"images/book-labels/Spiderman.webp",
"images/book-labels/Barbie.webp",
"images/book-labels/Ben10.webp",
"images/book-labels/Doraemon.webp",
"images/book-labels/Ironman.webp",
"images/book-labels/Unicorn.webp"

];

let index = 0;

setInterval(() => {

  index++;

  if(index >= images.length){
    index = 0;
  }

  document.getElementById("mainImage").src =
  images[index];

}, 2500);

</script>

</body>
</html>
