<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Book Labels</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:0;
}

.container{
display:flex;
gap:40px;
padding:40px;
flex-wrap:wrap;
}

.left{
flex:1;
min-width:350px;
}

.right{
flex:1;
min-width:350px;
}

.main-image{
width:100%;
max-width:550px;
border-radius:12px;
background:white;
padding:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
position:relative;
}

.main-image img{
width:100%;
border-radius:10px;
}

#uploadedPreview{
position:absolute;
top:80px;
left:20px;
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
display:none;
border:3px solid white;
}

.thumbnails{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

.thumbnails img{
width:90px;
height:70px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
border:2px solid transparent;
}

.thumbnails img:hover{
border:2px solid #000;
}

h1{
font-size:40px;
margin-bottom:10px;
}

.price{
font-size:35px;
font-weight:bold;
color:#ff0066;
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
margin:15px 0;
}

.buttons button{
padding:10px 18px;
border:none;
background:#eee;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.buttons button:hover{
background:black;
color:white;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:20px;
border-radius:8px;
border:1px solid #ccc;
}

.order-btn{
background:#00c853;
color:white;
padding:15px;
border:none;
width:100%;
font-size:20px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.order-btn:hover{
background:#009624;
}

</style>
</head>

<body>

<div class="container">

<div class="left">

<div class="main-image">

<img id="mainProductImage" src="images/book-labels/Spiderman.webp">

<img id="uploadedPreview">

</div>

<div class="thumbnails">

<img src="images/book-labels/Spiderman.webp" onclick="changeImage(this.src)">
<img src="images/book-labels/Barbie.webp" onclick="changeImage(this.src)">
<img src="images/book-labels/Rocket.webp" onclick="changeImage(this.src)">
<img src="images/book-labels/SchoolBus.webp" onclick="changeImage(this.src)">
<img src="images/book-labels/Astronaut.webp" onclick="changeImage(this.src)">
<img src="images/book-labels/Doraemon.webp" onclick="changeImage(this.src)">

</div>

</div>

<div class="right">

<h1>School Book Labels 📚</h1>

<div class="price">₹99</div>

<h3>Sticker Models</h3>

<div class="buttons">

<button onclick="setDesign('images/book-labels/Spiderman.webp')">Spiderman</button>

<button onclick="setDesign('images/book-labels/Barbie.webp')">Barbie</button>

<button onclick="setDesign('images/book-labels/Rocket.webp')">Rocket</button>

<button onclick="setDesign('images/book-labels/SchoolBus.webp')">School Bus</button>

<button onclick="setDesign('images/book-labels/Astronaut.webp')">Astronaut</button>

<button onclick="setDesign('images/book-labels/Doraemon.webp')">Doraemon</button>

</div>

<h3>Upload Student Photo</h3>

<input type="file" id="photoUpload">

<h3>Student Name</h3>

<input type="text" placeholder="Enter Student Name">

<h3>School Name</h3>

<input type="text" placeholder="Enter School Name">

<h3>Paper Quality</h3>

<select>
<option>Normal</option>
<option>Waterproof</option>
</select>

<button class="order-btn">
Order Now
</button>

</div>

</div>

<script>

function changeImage(src){
document.getElementById("mainProductImage").src = src;
}

function setDesign(src){
document.getElementById("mainProductImage").src = src;
}

document.getElementById("photoUpload").addEventListener("change", function(event){

const file = event.target.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(e){

const preview = document.getElementById("uploadedPreview");

preview.src = e.target.result;

preview.style.display = "block";

}

reader.readAsDataURL(file);

}

});

</script>

</body>
</html>
